<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web ePub Creator Pro</title>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Standard JSZip Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root {
            --bg-color: #121824;
            --card-bg: #1e2640;
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --primary-blue: #3b82f6;
            --btn-gray: #334155;
            --btn-red: #ef4444;
            --btn-green: #10b981;
            --border-color: #334155;
            --input-bg: #0f172a;
        }

        .light-mode {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --primary-blue: #2563eb;
            --btn-gray: #e2e8f0;
            --btn-red: #dc2626;
            --btn-green: #16a34a;
            --border-color: #cbd5e1;
            --input-bg: #f1f5f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; justify-content: center; transition: background 0.3s; }
        
        .app-container { width: 100%; max-width: 520px; background-color: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); overflow: hidden; border: 1px solid var(--border-color); }
        
        /* Auth Screen */
        #auth-screen { padding: 40px 20px; display: flex; flex-direction: column; gap: 15px; }
        .auth-toggle { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; font-weight: bold; }
        .auth-toggle span { cursor: pointer; color: var(--text-muted); padding-bottom: 5px; }
        .auth-toggle span.active { color: var(--primary-blue); border-bottom: 2px solid var(--primary-blue); }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--border-color); }
        .brand { display: flex; align-items: center; gap: 8px; font-size: 1rem; font-weight: bold; }
        .brand span.premium { background-color: #22c55e; color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 20px; }
        .header-btns { display: flex; gap: 8px; }
        .mode-btn, .lang-btn, .logout-btn { border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .mode-btn { background-color: #f59e0b; color: white; }
        .lang-btn { background-color: var(--btn-gray); color: var(--text-color); }
        .logout-btn { background-color: var(--btn-red); color: white; }

        /* Content */
        .content { padding: 20px; display: flex; flex-direction: column; gap: 18px; }
        .panel { border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; background-color: rgba(0, 0, 0, 0.15); }
        .panel-title { text-align: center; font-size: 0.9rem; margin-bottom: 12px; display: flex; justify-content: center; align-items: center; gap: 6px; font-weight: bold; }
        
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-weight: bold; font-size: 0.9rem; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; background-color: var(--input-bg); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-color); outline: none; }
        
        /* Buttons */
        .btn { width: 100%; padding: 11px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; color: white; font-size: 0.9rem; }
        .btn-gray { background-color: var(--btn-gray); color: var(--text-color); }
        .btn-blue { background-color: var(--primary-blue); }
        .btn-red { background-color: var(--btn-red); }
        .btn-green { background-color: var(--btn-green); }

        /* Chapter Management List */
        .chapter-list-box { display: flex; flex-direction: column; gap: 5px; max-height: 150px; overflow-y: auto; background: var(--input-bg); padding: 8px; border-radius: 6px; border: 1px solid var(--border-color); margin-top: 5px; }
        .chapter-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
        .chapter-item.active { background: var(--primary-blue); color: white; }
        .chapter-item i { cursor: pointer; color: var(--btn-red); }

        /* Rich Editor */
        .editor-container { background-color: white; border-radius: 6px; overflow: hidden; border: 1px solid var(--border-color); margin-top: 5px; }
        .toolbar { background-color: #f1f5f9; padding: 8px; display: flex; gap: 12px; border-bottom: 1px solid #cbd5e1; }
        .toolbar button { background: none; border: none; cursor: pointer; color: #334155; font-size: 0.95rem; }
        .toolbar button:hover { color: var(--primary-blue); }
        .editor-area { min-height: 220px; max-height: 400px; padding: 12px; color: #000000; background-color: #ffffff; outline: none; overflow-y: auto; font-size: 0.95rem; line-height: 1.5; }
        .editor-area img { max-width: 100%; border-radius: 6px; margin: 8px 0; display: block; }

        .pdf-box { background-color: rgba(16, 185, 129, 0.08); border: 1px dashed var(--btn-green); border-radius: 8px; padding: 12px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">

    <!-- SIGN IN / SIGN UP SCREEN -->
    <div id="auth-screen">
        <div class="auth-toggle">
            <span id="tab-login" class="active" onclick="switchAuthTab('login')">Sign In</span>
            <span id="tab-register" onclick="switchAuthTab('register')">Sign Up</span>
        </div>
        <div class="form-group">
            <label id="lbl-email">အီးမေးလ် (Email)</label>
            <input type="text" id="auth-email" placeholder="example@gmail.com" value="user@epub.com">
        </div>
        <div class="form-group">
            <label id="lbl-pass">လျှို့ဝှက်နံပါတ် (Password)</label>
            <input type="password" id="auth-password" placeholder="******" value="123456">
        </div>
        <button class="btn btn-blue" id="btn-auth" onclick="handleAuth()">Sign In</button>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="main-app" class="hidden">
        <div class="header">
            <div class="brand">
                <i class="fa-solid fa-globe"></i> Web ePub Creator Pro <span class="premium">Premium</span>
            </div>
            <div class="header-btns">
                <button class="lang-btn" onclick="toggleLanguage()">EN</button>
                <button class="mode-btn" onclick="toggleDarkMode()">Light Mode</button>
                <button class="logout-btn" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </div>

        <div class="content">
            <!-- Backup Management -->
            <div class="panel">
                <div class="panel-title" id="lbl-backup-title"><i class="fa-solid fa-floppy-disk"></i> စာအုပ် BACKUP စီမံခန့်ခွဲမှု</div>
                <button class="btn btn-gray" onclick="exportBackup()" style="margin-bottom:8px;"><i class="fa-solid fa-floppy-disk"></i> <span id="lbl-btn-backup">လက်ရှိစာအုပ်ကို ဖိုင်သိမ်းဆည်းမည် (Backup)</span></button>
                
                <input type="file" id="import-file" class="hidden" onchange="importBackup(event)" accept=".json">
                <button class="btn btn-blue" onclick="document.getElementById('import-file').click()" style="margin-bottom:8px;"><i class="fa-solid fa-box-open"></i> <span id="lbl-btn-load">စာအုပ်ဟောင်း ပြန်တင်မည် (Load Backup)</span></button>
                
                <button class="btn btn-red" onclick="resetForm()"><i class="fa-solid fa-paintbrush"></i> <span id="lbl-btn-reset">စာအုပ်အသစ်အတွက် အစကပြန်စမည် (Reset)</span></button>
            </div>

            <!-- Meta Data -->
            <div class="form-group">
                <label id="lbl-book-title">စာအုပ်အမည် (Book Title)</label>
                <input type="text" id="book-title" placeholder="My Novel" oninput="saveCurrentBookState()">
            </div>

            <div class="form-group">
                <label id="lbl-author">စာရေးဆရာ (Author)</label>
                <input type="text" id="author" placeholder="Unknown Author" oninput="saveCurrentBookState()">
            </div>

            <div class="form-group">
                <label id="lbl-cover">မျက်နှာဖုံးပုံ (Cover Image)</label>
                <input type="file" id="cover-image" accept="image/*" onchange="handleCoverUpload(event)">
                <small id="cover-status" style="color: var(--btn-green); font-weight:bold; margin-top:2px;"></small>
            </div>

            <!-- Chapters Management -->
            <div class="form-group">
                <label id="lbl-chapters">အခန်းများ (Chapters)</label>
                <button class="btn btn-blue" onclick="addNewChapter()"><i class="fa-solid fa-plus"></i> <span id="lbl-btn-addchapter">အခန်းတိုးမည် (Add Chapter)</span></button>
                <div class="chapter-list-box" id="chapter-list"></div>
            </div>

            <!-- PDF Optional -->
            <div class="pdf-box">
                <div style="color: #10b981; font-weight: bold; font-size: 0.85rem; margin-bottom: 8px;">
                    <i class="fa-solid fa-file-pdf"></i> <span id="lbl-pdf-title">PDF မှ စာသားထုတ်ယူရန် (Optional)</span>
                </div>
                <input type="file" accept=".pdf" style="margin-bottom: 8px; font-size:0.8rem;">
                <button class="btn btn-green" style="padding:8px; font-size:0.85rem;"><i class="fa-solid fa-bolt"></i> <span id="lbl-btn-pdfextract">PDF မှ စာသားများကို ဆွဲထုတ်မည်</span></button>
            </div>

            <!-- Chapter Editor Section -->
            <div class="form-group">
                <label id="lbl-chap-title">အခန်းခေါင်းစဉ် (Chapter Title)</label>
                <input type="text" id="chapter-title" placeholder="Chapter Title" oninput="updateActiveChapterTitle(this.value)">
            </div>

            <button class="btn btn-red" onclick="clearContent()"><i class="fa-solid fa-broom"></i> <span id="lbl-btn-clear">စာသားအားလုံးဖျက်ရန် (Clear All Content)</span></button>

            <!-- Text & Multiple Image Editor -->
            <div class="form-group">
                <label id="lbl-chap-content">အခန်းတွင်းစာသား (Chapter Content)</label>
                <div class="editor-container">
                    <div class="toolbar">
                        <button onclick="formatDoc('bold')"><i class="fa-solid fa-bold"></i></button>
                        <button onclick="formatDoc('italic')"><i class="fa-solid fa-italic"></i></button>
                        <button onclick="formatDoc('underline')"><i class="fa-solid fa-underline"></i></button>
                        <button onclick="formatDoc('insertUnorderedList')"><i class="fa-solid fa-list-ul"></i></button>
                        
                        <button onclick="document.getElementById('editor-multiple-imgs').click()"><i class="fa-solid fa-images"></i></button>
                        <input type="file" id="editor-multiple-imgs" class="hidden" accept="image/*" multiple onchange="insertMultipleImages(event)">
                        
                        <button onclick="formatDoc('removeFormat')"><i class="fa-solid fa-text-slash"></i></button>
                    </div>
                    <div class="editor-area" id="editor" contenteditable="true" oninput="updateActiveChapterContent()"></div>
                </div>
            </div>

            <!-- Export ePub Button -->
            <button class="btn btn-green" onclick="generateEPUB()">
                <i class="fa-solid fa-box"></i> <span id="lbl-btn-export">ePub ဖိုင် ထုတ်ယူမည်</span>
            </button>
        </div>
    </div>
</div>

<script>
    let currentLang = 'my';
    let bookChapters = []; 
    let activeChapterId = null;
    let coverBase64 = "";

    const langData = {
        my: {
            email: "အီးမေးလ် (Email)", pass: "လျှို့ဝှက်နံပါတ် (Password)",
            backupTitle: "စာအုပ် BACKUP စီမံခန့်ခွဲမှု", btnBackup: "လက်ရှိစာအုပ်ကို ဖိုင်သိမ်းဆည်းမည် (Backup)",
            btnLoad: "စာအုပ်ဟောင်း ပြန်တင်မည် (Load Backup)", btnReset: "စာအုပ်အသစ်အတွက် အစကပြန်စမည် (Reset)",
            bookTitle: "စာအုပ်အမည် (Book Title)", author: "စာရေးဆရာ (Author)", cover: "မျက်နှာဖုံးပုံ (Cover Image)",
            chapters: "အခန်းများ (Chapters)", btnAddChap: "အခန်းတိုးမည် (Add Chapter)", pdfTitle: "PDF မှ စာသားထုတ်ယူရန် (Optional)",
            btnPdf: "PDF မှ စာသားများကို ဆွဲထုတ်မည်", chapTitle: "အခန်းခေါင်းစဉ် (Chapter Title)",
            btnClear: "စာသားအားလုံးဖျက်ရန် (Clear All Content)", chapContent: "အခန်းတွင်းစာသား (Chapter Content)",
            btnExport: "ePub ဖိုင် ထုတ်ယူမည်"
        },
        en: {
            email: "Email Address", pass: "Password",
            backupTitle: "Book BACKUP Management", btnBackup: "Save Current Book (Backup)",
            btnLoad: "Load Old Book (Load Backup)", btnReset: "Reset for New Book",
            bookTitle: "Book Title", author: "Author", cover: "Cover Image",
            chapters: "Chapters", btnAddChap: "Add Chapter", pdfTitle: "Extract Text from PDF (Optional)",
            btnPdf: "Extract Text from PDF", chapTitle: "Chapter Title",
            btnClear: "Clear All Content", chapContent: "Chapter Content",
            btnExport: "Export ePub File"
        }
    };

    window.onload = function() {
        if (localStorage.getItem('epub_logged_in') === 'true') {
            showMainApp();
        }
    };

    function switchAuthTab(tab) {
        document.getElementById('tab-login').classList.toggle('active', tab === 'login');
        document.getElementById('tab-register').classList.toggle('active', tab === 'register');
        document.getElementById('btn-auth').innerText = tab === 'login' ? 'Sign In' : 'Sign Up';
    }

    function handleAuth() {
        localStorage.setItem('epub_logged_in', 'true');
        showMainApp();
    }

    function handleLogout() {
        localStorage.removeItem('epub_logged_in');
        document.getElementById('main-app').classList.add('hidden');
        document.getElementById('auth-screen').classList.remove('hidden');
    }

    function showMainApp() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        loadBookState(); 
    }

    function addNewChapter() {
        const id = Date.now();
        const num = bookChapters.length + 1;
        const newChap = { id: id, title: "Chapter " + num, content: "စာသားများနှင့် ပုံများထည့်ပါ။" };
        bookChapters.push(newChap);
        activeChapterId = id;
        renderChapterList();
        loadActiveChapter();
        saveCurrentBookState();
    }

    function renderChapterList() {
        const listContainer = document.getElementById('chapter-list');
        listContainer.innerHTML = "";
        bookChapters.forEach((chap) => {
            const div = document.createElement('div');
            div.className = `chapter-item ${chap.id === activeChapterId ? 'active' : ''}`;
            div.setAttribute('onclick', `selectChapter(${chap.id})`);
            div.innerHTML = `<span><i class="fa-solid fa-book-open" style="margin-right:5px;"></i> ${chap.title}</span> 
                             <i class="fa-solid fa-trash" onclick="deleteChapter(event, ${chap.id})"></i>`;
            listContainer.appendChild(div);
        });
    }

    function selectChapter(id) {
        activeChapterId = id;
        renderChapterList();
        loadActiveChapter();
    }

    function loadActiveChapter() {
        const chap = bookChapters.find(c => c.id === activeChapterId);
        if(chap) {
            document.getElementById('chapter-title').value = chap.title;
            document.getElementById('editor').innerHTML = chap.content;
        } else {
            document.getElementById('chapter-title').value = "";
            document.getElementById('editor').innerHTML = "";
        }
    }

    function updateActiveChapterTitle(val) {
        const chap = bookChapters.find(c => c.id === activeChapterId);
        if(chap) {
            chap.title = val;
            renderChapterList();
            saveCurrentBookState();
        }
    }

    function updateActiveChapterContent() {
        const chap = bookChapters.find(c => c.id === activeChapterId);
        if(chap) {
            chap.content = document.getElementById('editor').innerHTML;
            saveCurrentBookState();
        }
    }

    function deleteChapter(e, id) {
        e.stopPropagation();
        bookChapters = bookChapters.filter(c => c.id !== id);
        if(activeChapterId === id) activeChapterId = bookChapters.length > 0 ? bookChapters[0].id : null;
        renderChapterList();
        loadActiveChapter();
        saveCurrentBookState();
    }

    function insertMultipleImages(event) {
        const files = event.target.files;
        if (!files.length) return;
        document.getElementById('editor').focus();
        
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const imgHtml = `<img src="${e.target.result}" /><p><br></p>`;
                document.execCommand('insertHTML', false, imgHtml);
                updateActiveChapterContent();
            };
            reader.readAsDataURL(file);
        });
        event.target.value = '';
    }

    function handleCoverUpload(event) {
        const file = event.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                coverBase64 = e.target.result;
                document.getElementById('cover-status').innerText = "Cover Loaded ✓";
                saveCurrentBookState();
            }
            reader.readAsDataURL(file);
        }
    }

    function saveCurrentBookState() {
        const fullData = {
            title: document.getElementById('book-title').value,
            author: document.getElementById('author').value,
            cover: coverBase64,
            chapters: bookChapters,
            activeId: activeChapterId
        };
        localStorage.setItem('epub_master_data', JSON.stringify(fullData));
    }

    function loadBookState() {
        const stored = localStorage.getItem('epub_master_data');
        if(stored) {
            const data = JSON.parse(stored);
            document.getElementById('book-title').value = data.title || "";
            document.getElementById('author').value = data.author || "";
            coverBase64 = data.cover || "";
            if(coverBase64) document.getElementById('cover-status').innerText = "Cover Restored ✓";
            
            bookChapters = data.chapters || [];
            activeChapterId = data.activeId || (bookChapters.length > 0 ? bookChapters[0].id : null);
            
            renderChapterList();
            loadActiveChapter();
        }
    }

    function exportBackup() {
        saveCurrentBookState();
        const dataStr = localStorage.getItem('epub_master_data');
        if(!dataStr) return alert("ဒေတာမရှိသေးပါ!");
        
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = (document.getElementById('book-title').value || 'my_book') + '_backup.json';
        a.click();
    }

    function importBackup(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            localStorage.setItem('epub_master_data', e.target.result);
            loadBookState();
            alert("ဒေတာများအားလုံး ပြန်တင်ပြီးပါပြီ။");
        };
        reader.readAsText(file);
    }

    // Base64 string ထဲကနေ ePub သိမ်းဆည်းဖို့ သက်ဆိုင်ရာ Binary Byte Data အဖြစ် ပြောင်းပေးတဲ့ helper function
    function base64ToBlob(base64Data) {
        const sliceSize = 1024;
        const byteCharacters = atob(base64Data.split(',')[1]);
        const byteArrays = [];
        for (let offset = 0; offset < byteCharacters.length; offset += sliceSize) {
            const slice = byteCharacters.slice(offset, offset + sliceSize);
            const byteNumbers = new Array(slice.length);
            for (let i = 0; i < slice.length; i++) {
                byteNumbers[i] = slice.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            byteArrays.push(byteArray);
        }
        return new Blob(byteArrays);
    }

    // --- 🌟 INDUSTRIAL GRADE MULTI-IMAGE EPUB ENGINE 🌟 ---
    function generateEPUB() {
        saveCurrentBookState();
        
        const title = document.getElementById('book-title').value || "Untitled Book";
        const author = document.getElementById('author').value || "Unknown Author";
        
        if(bookChapters.length === 0) {
            alert("ကျေးဇူးပြု၍ အခန်း (Chapter) အနည်းဆုံး တစ်ခု အရင်တိုးပေးပါ။");
            return;
        }

        if (typeof JSZip === 'undefined') {
            alert("JSZip Library မတက်သေးပါ၊ ခေတ္တစောင့်ပြီး ပြန်ကြိုးစားပေးပါ။");
            return;
        }

        const zip = new JSZip();
        
        // Rule 1: Apple Books Requirement - mimetype MUST be the absolute first file and uncompressed
        zip.file("mimetype", "application/epub+zip", { compression: "STORE" });
        
        // Metadata Structure
        const containerXml = `<?xml version="1.0" encoding="UTF-8"?>
        <container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">
            <rootfiles>
                <rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/>
            </rootfiles>
        </container>`;
        zip.file("META-INF/container.xml", containerXml);

        let manifestItems = "";
        let spineItems = "";
        let imageCounter = 1;

        // အခန်းများကို တစ်ခန်းချင်းစီ စစ်ဆေးပြီး HTML သန့်စင်ခြင်းနှင့် ပုံများထုတ်ယူခြင်း စတင်မည်
        bookChapters.forEach((chap, index) => {
            let htmlString = chap.content || "";
            
            // Unescaped space များကို ပြောင်းလဲခြင်း
            htmlString = htmlString.replace(/&nbsp;/g, '&#160;');

            // HTML parser တည်ဆောက်ခြင်း
            const parser = new DOMParser();
            const doc = parser.parseFromString(`<div>${htmlString}</div>`, 'text/html');
            const container = doc.body.firstChild;

            // <br> တက်ဂ်များကို <p> လွတ်အဖြစ် သန့်ရှင်းစွာ အစားထိုးခြင်း
            const brs = container.querySelectorAll('br');
            brs.forEach(br => {
                const pBr = doc.createElement('p');
                pBr.innerHTML = '&#160;';
                br.replaceWith(pBr);
            });

            // 🌟 ဓာတ်ပုံများကို ဖမ်းယူပြီး ePub Image Resource အဖြစ် ပြောင်းလဲသိုလှောင်ခြင်း စနစ်သစ် 🌟
            const imgs = container.querySelectorAll('img');
            imgs.forEach(img => {
                const src = img.getAttribute('src');
                if (src && src.startsWith('data:image')) {
                    // Image Type ရှာဖွေခြင်း (png သို့မဟုတ် jpeg)
                    let ext = "jpg";
                    let mediaType = "image/jpeg";
                    if (src.includes("image/png")) { ext = "png"; mediaType = "image/png"; }
                    else if (src.includes("image/gif")) { ext = "gif"; mediaType = "image/gif"; }

                    const filename = `image_${imageCounter}.${ext}`;
                    const imgBlob = base64ToBlob(src);
                    
                    // 1. ePub ထဲသို့ ဓာတ်ပုံဖိုင်ကို သီးသန့် လမ်းကြောင်းဖြင့် ထည့်သွင်းခြင်း
                    zip.file(`OEBPS/images/${filename}`, imgBlob);
                    
                    // 2. content.opf အတွက် Manifest ကြေညာချက် တည်ဆောက်ခြင်း
                    manifestItems += `<item id="img_${imageCounter}" href="images/${filename}" media-type="${mediaType}"/>\n`;

                    // 3. XHTML ထဲက <img> တက်ဂ်ရဲ့ src လမ်းကြောင်းကို ePub Internal relative path သို့ ပြောင်းလဲခြင်း
                    img.setAttribute('src', `images/${filename}`);
                    if (!img.getAttribute('alt')) img.setAttribute('alt', `photo_${imageCounter}`);
                    
                    imageCounter++;
                }
            });

            // XMLSerializer သုံးပြီး တက်ဂ်များကို ရာနှုန်းပြည့် လုံခြုံစိတ်ချရသော XHTML အဖြစ် ပြန်ပြောင်းခြင်း
            const serializer = new XMLSerializer();
            let finalizedXhtmlContent = serializer.serializeToString(container);
            finalizedXhtmlContent = finalizedXhtmlContent.replace(/^<div[^>]*>/, '').replace(/<\/div>$/, '');

            // အခန်းတစ်ခုချင်းစီအတွက် XHTML စာမျက်နှာ တည်ဆောက်ခြင်း
            const chapHtml = `<?xml version="1.0" encoding="utf-8"?>
            <!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN" "http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd">
            <html xmlns="http://www.w3.org/1999/xhtml">
            <head>
                <title>${chap.title}</title>
                <style>
                    body { padding: 20px; font-family: sans-serif; line-height: 1.6; color: #111111; background-color: #ffffff; }
                    img { max-width: 100%; height: auto; display: block; margin: 15px auto; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
                    h1 { font-size: 1.5em; text-align: center; margin-bottom: 20px; color: #1e2640; }
                    p { margin-bottom: 0.8em; text-align: justify; line-height: 1.6; }
                </style>
            </head>
            <body>
                <h1>${chap.title}</h1>
                <div>${finalizedXhtmlContent}</div>
            </body>
            </html>`;
            
            zip.file(`OEBPS/chapter_${index + 1}.xhtml`, chapHtml);
            manifestItems += `<item id="chap_${index + 1}" href="chapter_${index + 1}.xhtml" media-type="application/xhtml+xml"/>\n`;
            spineItems += `<itemref idref="chap_${index + 1}"/>\n`;
        });

        // မျက်နှာဖုံးပုံ (Cover) ရှိခဲ့ရင် ထည့်သွင်းပေးခြင်း
        if (coverBase64) {
            let coverExt = "jpg";
            let coverMime = "image/jpeg";
            if (coverBase64.includes("image/png")) { coverExt = "png"; coverMime = "image/png"; }
            
            const coverBlob = base64ToBlob(coverBase64);
            zip.file(`OEBPS/images/cover.${coverExt}`, coverBlob);
            manifestItems += `<item id="cover-img" href="images/cover.${coverExt}" media-type="${coverMime}"/>\n`;
        }

        // Content OPF ဖိုင်တည်ဆောက်ခြင်း
        const opfXml = `<?xml version="1.0" encoding="UTF-8"?>
        <package xmlns="http://www.idpf.org/2007/opf" unique-identifier="bookid" version="2.0">
            <metadata xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:opf="http://www.idpf.org/2007/opf">
                <dc:title>${title}</dc:title>
                <dc:creator opf:role="aut">${author}</dc:creator>
                <dc:language>my</dc:language>
                <dc:identifier id="bookid">urn:uuid:${Date.now()}</dc:identifier>
                ${coverBase64 ? '<meta name="cover" content="cover-img"/>' : ''}
            </metadata>
            <manifest>
                <item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>
                ${manifestItems}
            </manifest>
            <spine toc="ncx">
                ${spineItems}
            </spine>
        </package>`;
        zip.file("OEBPS/content.opf", opfXml);

        // NCX Navigation
        let ncxNav = "";
        bookChapters.forEach((chap, index) => {
            ncxNav += `<navPoint id="nav_${index + 1}" playOrder="${index + 1}">
                <navLabel><text>${chap.title}</text></navLabel>
                <content src="chapter_${index + 1}.xhtml"/>
            </navPoint>\n`;
        });

        const ncxXml = `<?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE ncx PUBLIC "-//NISO//DTD ncx v2005-1//EN" "http://www.daisy.org/z3986/2005/ncx-2005-1.dtd">
        <ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1">
            <head>
                <meta name="dtb:uid" content="urn:uuid:${Date.now()}"/>
                <meta name="dtb:depth" content="1"/>
            </head>
            <docTitle><text>${title}</text></docTitle>
            <navMap>${ncxNav}</navMap>
        </ncx>`;
        zip.file("OEBPS/toc.ncx", ncxXml);

        // ePub ဖိုင် ထုတ်ယူပြီး Download ပြုလုပ်ခြင်း
        zip.generateAsync({ type: "blob", mimeType: "application/epub+zip" }).then(function (blob) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = title.replace(/\s+/g, '_') + ".epub";
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 2000);
        }).catch(function (err) {
            alert("ePub Generation Error: " + err.message);
        });
    }

    function formatDoc(cmd) { document.execCommand(cmd, false, null); }
    function clearContent() { document.getElementById('editor').innerHTML = ""; updateActiveChapterContent(); }
    
    function resetForm() {
        if(confirm("အစက ပြန်စမှာ သေချာပါသလား။")) {
            localStorage.removeItem('epub_master_data');
            bookChapters = []; activeChapterId = null; coverBase64 = "";
            document.getElementById('book-title').value = "";
            document.getElementById('author').value = "";
            document.getElementById('cover-status').innerText = "";
            renderChapterList(); loadActiveChapter();
        }
    }

    function toggleDarkMode() {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        document.querySelector('.mode-btn').innerText = isLight ? "Dark Mode" : "Light Mode";
    }

    function toggleLanguage() {
        currentLang = currentLang === 'my' ? 'en' : 'my';
        document.querySelector('.lang-btn').innerText = currentLang === 'my' ? 'EN' : 'MY';
        const data = langData[currentLang];
        document.getElementById('lbl-email').innerText = data.email;
        document.getElementById('lbl-pass').innerText = data.pass;
        document.getElementById('lbl-backup-title').innerHTML = `<i class="fa-solid fa-floppy-disk"></i> ${data.backupTitle}`;
        document.getElementById('lbl-btn-backup').innerText = data.btnBackup;
        document.getElementById('lbl-btn-load').innerText = data.btnLoad;
        document.getElementById('lbl-btn-reset').innerText = data.btnReset;
        document.getElementById('lbl-book-title').innerText = data.bookTitle;
        document.getElementById('author').innerText = data.author;
        document.getElementById('lbl-cover').innerText = data.cover;
        document.getElementById('lbl-chapters').innerText = data.chapters;
        document.getElementById('lbl-btn-addchapter').innerText = data.btnAddChap;
        document.getElementById('lbl-pdf-title').innerText = data.pdfTitle;
        document.getElementById('lbl-btn-pdfextract').innerText = data.btnPdf;
        document.getElementById('lbl-chap-title').innerText = data.chapTitle;
        document.getElementById('lbl-btn-clear').innerText = data.btnClear;
        document.getElementById('lbl-chap-content').innerText = data.chapContent;
        document.getElementById('lbl-btn-export').innerText = data.btnExport;
    }
</script>
</body>
