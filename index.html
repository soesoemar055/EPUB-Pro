<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Web ePub Creator Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <div class="container">
        <h2>Web ePub Creator Pro</h2>
        <div id="toolbar">
            <button onclick="document.execCommand('bold', false, null)"><b>B</b></button>
            <button onclick="document.getElementById('imgInput').click()">📷 ပုံထည့်ရန်</button>
        </div>
        <div id="editor" contenteditable="true">ဒီနေရာမှာ စာရိုက်ပါ...</div>
        <input type="file" id="imgInput" accept="image/*" multiple style="display:none">
        <button id="downloadBtn" onclick="generateEPUB()">ePub ဖိုင် ထုတ်ယူရန်</button>
        <div id="status"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
